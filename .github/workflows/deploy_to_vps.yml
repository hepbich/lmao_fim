name: Deploy to VPS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.ZIRKA_BOT_SSH_PRIVATE_KEY }}
          known_hosts: unnecessary

      - name: Adding Known Hosts
        run: ssh-keyscan -H ${{ secrets.ZIRKA_BOT_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Run command on remote server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ZIRKA_BOT_SSH_HOST }}
          username: ${{ secrets.ZIRKA_BOT_SSH_USER }}
          key: ${{ secrets.ZIRKA_BOT_SSH_PRIVATE_KEY }}
          script: |
            echo '--- START WORK ON REMOTE SERVER ---';
            cd ZirkaBot;
            echo '--- EXPORT VARIABLES ---';
            export BOT_TOKEN=${{ secrets.ZIRKA_BOT_TOKEN }};
            export AI_KEY=${{ secrets.ZIRKA_AI_KEY }};
            export VCHAT_ID=${{ vars.VCHAT_ID }}
            export DCHAT_ID=${{ vars.DCHAT_ID }}
            export SCHAT_ID=${{ vars.SCHAT_ID }}
            echo '--- LIST OF FILES ---';
            ls -al;
            echo '--- GIT PULL ---'
            git pull;
            echo '--- DOCKER OPERATIONS ---';
            docker-compose down;
            docker rmi zirka_bot;
            echo '--- LIST OF DOCKER CONTAINERS ---';
            docker ps -a;
            echo '--- UP CONTAINER ---';
            docker-compose up -d;
            echo '--- LIST OF DOCKER CONTAINERS ---';
            docker ps -a;